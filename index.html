<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ma Bibliothèque</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2C251F">
    <link rel="apple-touch-icon" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-parchment: #F4EEDD; --bg-parchment-dark: #E8DCC4;
            --text-ink: #2C251F; --text-ink-light: #5A4E45;
            --accent-wood: #8C5A40; --color-success: #4A7C59; --color-danger: #C0392B; --color-star: #f39c12;
            --color-ambiance: #f3e5f5; --color-ambiance-dark: #ab47bc;
            --shadow-soft: 0 4px 12px rgba(44, 37, 31, 0.08);
            --font-title: 'Merriweather', serif; --font-body: 'Inter', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-parchment); color: var(--text-ink); font-family: var(--font-body); line-height: 1.6; overflow-x: hidden; padding-bottom: 80px; }
        h1, h2, h3 { font-family: var(--font-title); color: var(--accent-wood); }
        h3.section-title { font-size: 1.2rem; margin: 25px 0 10px 0; display: flex; align-items: center; gap: 8px; border-bottom: 2px solid var(--bg-parchment-dark); padding-bottom: 5px; }
        #app-container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .search-area { position: sticky; top: 0; z-index: 80; background: var(--bg-parchment); padding-bottom: 10px; margin-bottom: 20px; }
        .search-header { display: flex; gap: 8px; align-items: center; width: 100%; }
        .search-container { position: relative; flex: 1; min-width: 0; }
        #search-input { width: 100%; padding: 10px 15px 10px 40px; border: 2px solid var(--bg-parchment-dark); border-radius: 25px; font-size: 0.95rem; background: #fff; transition: 0.2s; color: var(--text-ink); }
        .btn-icon-header { background: #fff; border: 2px solid var(--bg-parchment-dark); border-radius: 50%; width: 42px; height: 42px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; cursor: pointer; color: var(--text-ink); }
        .filter-panel { background: rgba(255, 255, 255, 0.95); border: 1px solid var(--bg-parchment-dark); border-radius: 12px; padding: 15px; margin-top: 10px; display: none; flex-direction: column; gap: 15px; box-shadow: var(--shadow-soft); }
        .filter-panel.open { display: flex; }
        .filter-chips-container { display: flex; flex-wrap: wrap; gap: 8px; padding-bottom: 5px; }
        .filter-chip { padding: 6px 14px; border-radius: 20px; background: #fff; border: 1px solid var(--bg-parchment-dark); font-size: 0.85rem; white-space: nowrap; cursor: pointer; transition: 0.2s; }
        .filter-chip.active { background: var(--accent-wood); color: #fff; border-color: var(--accent-wood); }
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background-color: var(--bg-parchment-dark); display: flex; justify-content: space-around; padding: 6px 0; z-index: 100; }
        .nav-btn { background: none; border: none; color: var(--text-ink-light); font-size: 0.65rem; font-weight: 600; cursor: pointer; padding: 8px 2px; display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 1; }
        .nav-btn.active { color: var(--accent-wood); background-color: rgba(140, 90, 64, 0.15); }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 10px; }
        .card { background: #fff; border: 2px solid var(--bg-parchment-dark); border-radius: 12px; padding: 15px; display: flex; flex-direction: column; cursor: pointer; position: relative;}
        .badge { display: inline-block; background: var(--bg-parchment); padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
        .badge-ambiance { background: var(--color-ambiance); color: var(--color-ambiance-dark); }
        dialog { margin: auto; border: none; border-radius: 12px; background-color: var(--bg-parchment); width: 95%; max-width: 600px; padding: 0; }
        .modal-content { padding: 25px; max-height: 90vh; overflow-y: auto; position: relative; }
        .btn-primary { width: 100%; padding: 15px; background: var(--accent-wood); color: #fff; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .settings-card { background: #fff; padding: 20px; border-radius: 12px; border: 1px solid var(--bg-parchment-dark); margin-bottom: 20px; }
        input[type="text"], input[type="password"], textarea { width: 100%; padding: 10px; border: 1px solid var(--bg-parchment-dark); border-radius: 8px; margin-top: 5px; }
        .btn-jukebox { width: 100%; padding: 15px; border-radius: 30px; border: none; font-size: 1.1rem; color: white; background: linear-gradient(135deg, var(--accent-wood), var(--color-ambiance-dark)); margin-bottom: 20px; }
    </style>
</head>
<body>
    <div id="app-container">
        <header><h1>Ma Bibliothèque</h1></header>
        <div class="search-area">
            <div class="search-header">
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Rechercher...">
                </div>
                <button id="btn-toggle-filters" class="btn-icon-header">🎛️</button>
            </div>
            <div id="filter-panel" class="filter-panel">
                <div class="filter-group"><label>Trier par</label><div class="filter-chips-container" id="filter-sort">
                    <div class="filter-chip active" data-type="sort" data-val="date_desc">📅 Récent</div>
                    <div class="filter-chip" data-type="sort" data-val="alpha_asc">📖 A-Z</div>
                    <div class="filter-chip" data-type="sort" data-val="createur_asc">👤 Auteur</div>
                </div></div>
                <div class="filter-group"><label>Genre</label><div class="filter-chips-container" id="filter-genre"></div></div>
                <div class="filter-group"><label>Ambiance</label><div class="filter-chips-container" id="filter-ambiance"></div></div>
            </div>
        </div>

        <nav id="main-nav">
            <button class="nav-btn active" data-target="view-dashboard">🏠 Accueil</button>
            <button class="nav-btn" data-target="view-books">📖 Livres</button>
            <button class="nav-btn" data-target="view-settings">⚙️ Réglages</button>
        </nav>

        <main>
            <section id="view-dashboard" class="view-section active">
                <button class="btn-jukebox" onclick="openJukeboxModal()">🎵 Que veux-tu vivre ?</button>
                <div id="list-recent" class="grid-container"></div>
            </section>
            <section id="view-books" class="view-section"><div id="list-books" class="grid-container"></div></section>
            <section id="view-settings" class="view-section">
                <div class="settings-card">
                    <h3>☁️ Cloud Sync (GitHub)</h3>
                    <input type="password" id="gh-token" placeholder="Token GitHub (ghp_...)">
                    <input type="text" id="gh-gist-id" placeholder="ID du Gist">
                    <button class="btn-primary" onclick="saveCloudSettings()">💾 Sauver les clés</button>
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <button class="btn-primary" style="background:var(--color-success)" onclick="pullFromCloud()">⬇️ Récupérer</button>
                        <button class="btn-primary" style="background:var(--accent-wood)" onclick="pushToCloud()">☁️ Envoyer</button>
                    </div>
                    <p id="cloud-status" style="margin-top:10px; font-weight:bold; font-size:0.8rem; text-align:center;"></p>
                </div>
                <div class="settings-card">
                    <h3>📦 Secours Local</h3>
                    <button class="btn-primary" onclick="exportToExcel()">💾 Sauver CSV</button>
                    <button class="btn-primary" onclick="document.getElementById('import-file').click()">📥 Charger CSV</button>
                    <input type="file" id="import-file" style="display:none" onchange="importFromCSV(this)">
                </div>
            </section>
        </main>
    </div>

    <button id="btn-fab-add" style="position:fixed; bottom:85px; right:20px; width:60px; height:60px; border-radius:50%; background:var(--accent-wood); color:white; border:none; font-size:1.5rem; z-index:110;">＋</button>

    <dialog id="modal-confirm"><div class="modal-content"><p id="confirm-msg"></p><button id="btn-confirm-action" class="btn-primary">Confirmer</button><button onclick="document.getElementById('modal-confirm').close()" class="btn-primary" style="background:#ccc">Annuler</button></div></dialog>
    <dialog id="modal-view"><div class="modal-content" id="view-content"></div></dialog>

    <script>
        let library = [];
        let cloudConfig = { token: '', gistId: '' };
        
        // --- INITIALISATION ---
        function init() {
            const stored = localStorage.getItem('myLibrary');
            if(stored) library = JSON.parse(stored);
            const conf = localStorage.getItem('cloudConfig');
            if(conf) {
                cloudConfig = JSON.parse(conf);
                document.getElementById('gh-token').value = cloudConfig.token;
                document.getElementById('gh-gist-id').value = cloudConfig.gistId;
            }
            renderAll();
        }

        // --- MOTEUR DE SYNC ROBUSTE ---
        function saveCloudSettings() {
            cloudConfig.token = document.getElementById('gh-token').value.trim();
            cloudConfig.gistId = document.getElementById('gh-gist-id').value.trim();
            localStorage.setItem('cloudConfig', JSON.stringify(cloudConfig));
            document.getElementById('cloud-status').innerText = "✅ Clés enregistrées localement.";
        }

        async function pullFromCloud() {
            const status = document.getElementById('cloud-status');
            if(!cloudConfig.token || !cloudConfig.gistId) {
                status.innerText = "❌ Erreur : Clés manquantes.";
                return;
            }
            status.innerText = "⏳ Connexion à GitHub...";
            try {
                const response = await fetch(`https://api.github.com/gists/${cloudConfig.gistId}`, {
                    headers: { 'Authorization': `token ${cloudConfig.token}` }
                });
                
                if (!response.ok) {
                    const errorBody = await response.json();
                    status.innerText = `❌ Erreur GitHub (${response.status}) : ${errorBody.message}`;
                    return;
                }

                const data = await response.json();
                const file = data.files['library.json'];
                if (!file) {
                    status.innerText = "❌ Erreur : library.json absent du Gist.";
                    return;
                }

                library = JSON.parse(file.content);
                localStorage.setItem('myLibrary', JSON.stringify(library));
                status.innerText = `✅ Succès ! ${library.length} œuvres récupérées.`;
                setTimeout(() => location.reload(), 1500);
            } catch (e) {
                status.innerText = `❌ Erreur réseau : ${e.message}`;
            }
        }

        async function pushToCloud() {
            const status = document.getElementById('cloud-status');
            if(!cloudConfig.token || !cloudConfig.gistId) {
                status.innerText = "❌ Erreur : Clés manquantes.";
                return;
            }
            status.innerText = "⏳ Envoi vers le Cloud...";
            try {
                const response = await fetch(`https://api.github.com/gists/${cloudConfig.gistId}`, {
                    method: 'PATCH',
                    headers: { 
                        'Authorization': `token ${cloudConfig.token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        files: { 'library.json': { content: JSON.stringify(library) } }
                    })
                });

                if (response.ok) {
                    status.innerText = "✅ Sauvegarde Cloud réussie !";
                } else {
                    const errorBody = await response.json();
                    status.innerText = `❌ Erreur envoi (${response.status}) : ${errorBody.message}`;
                }
            } catch (e) {
                status.innerText = `❌ Erreur réseau : ${e.message}`;
            }
        }

        // --- LE RESTE DES FONCTIONS ---
        function renderAll() {
            const container = document.getElementById('list-recent');
            container.innerHTML = '';
            library.sort((a,b) => b.dateAjout - a.dateAjout);
            library.slice(0, 10).forEach(i => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<b>${i.titre}</b><br><small>${i.createur}</small>`;
                container.appendChild(card);
            });
        }

        function exportToExcel() {
            let csv = "\ufeffType;Titre;Créateur;Genres;Ambiances;Date\n";
            library.forEach(i => {
                csv += `${i.type};"${i.titre}";"${i.createur}";"${(i.genres||[]).join(',')}";"${(i.ambiances||[]).join(',')}";${i.dateAjout}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = "ma_bibliotheque.csv";
            link.click();
        }

        function importFromCSV(input) {
            const reader = new FileReader();
            reader.onload = function(e) {
                // Logique simplifiée pour l'exemple
                alert("Importation réussie (simulée). Pense à cliquer sur 'Envoyer' pour sauver sur le Cloud !");
            };
            reader.readAsText(input.files[0]);
        }

        window.onload = init;
    </script>
</body>
</html>
