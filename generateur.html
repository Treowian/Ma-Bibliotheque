<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Générateur Icône Minimaliste</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #f0f0f0; font-family: sans-serif; padding-top: 50px; }
        canvas { border: 1px solid #ccc; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); border-radius: 20px; }
        button { padding: 12px 24px; font-size: 16px; font-weight: bold; cursor: pointer; background: #2C251F; color: #F4EEDD; border: none; border-radius: 8px; transition: 0.2s;}
        button:hover { background: #8C5A40; }
    </style>
</head>
<body>

    <canvas id="iconCanvas" width="512" height="512"></canvas>
    <button onclick="downloadIcon()">⬇️ Télécharger l'icône</button>

    <script>
        const canvas = document.getElementById('iconCanvas');
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;

        // 1. Fond Encre (Premium)
        ctx.fillStyle = '#2C251F';
        ctx.fillRect(0, 0, width, height);

        // 2. Réglages du trait (Parchemin)
        ctx.strokeStyle = '#F4EEDD';
        ctx.lineWidth = 32;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        // 3. Dessin géométrique du livre ouvert
        const centerX = width / 2;
        
        // Courbe supérieure
        ctx.beginPath();
        ctx.moveTo(120, 200);
        ctx.quadraticCurveTo(188, 150, centerX, 220);
        ctx.quadraticCurveTo(324, 150, 392, 200);
        ctx.stroke();

        // Courbe inférieure
        ctx.beginPath();
        ctx.moveTo(120, 360);
        ctx.quadraticCurveTo(188, 310, centerX, 380);
        ctx.quadraticCurveTo(324, 310, 392, 360);
        ctx.stroke();

        // Arête centrale
        ctx.beginPath();
        ctx.moveTo(centerX, 220);
        ctx.lineTo(centerX, 380);
        ctx.stroke();

        // Bordure gauche
        ctx.beginPath();
        ctx.moveTo(120, 200);
        ctx.lineTo(120, 360);
        ctx.stroke();

        // Bordure droite
        ctx.beginPath();
        ctx.moveTo(392, 200);
        ctx.lineTo(392, 360);
        ctx.stroke();

        // 4. L'étincelle de l'Oracle (Point Bois)
        ctx.fillStyle = '#8C5A40';
        ctx.beginPath();
        ctx.arc(centerX, 110, 24, 0, Math.PI * 2);
        ctx.fill();

        function downloadIcon() {
            const link = document.createElement('a');
            link.download = 'icon-512x512.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
