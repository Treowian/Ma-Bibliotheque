<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Générateur Icône - Ma Bibliothèque</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #e0e0e0; padding: 40px; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: #2C251F; margin-top: 0; font-size: 1.5rem;}
        p { color: #5A4E45; font-size: 0.95rem; margin-bottom: 30px; }
        
        .icon-preview { 
            width: 192px; height: 192px; margin: 0 auto 30px auto; 
            border-radius: 40px; /* Arrondi typique d'une icône iOS/Android */
            box-shadow: 0 8px 24px rgba(109, 67, 44, 0.25); 
            overflow: hidden; 
        }
        
        #canvas-icon { width: 100%; height: 100%; display: block; }
        
        .btn { display: block; width: 100%; padding: 15px; background: #6D432C; color: #fff; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; border: none; transition: 0.2s; }
        .btn:hover { background: #5A3622; transform: translateY(-2px); }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="container">
    <h1>Nouvelle Icône "Foyer & Lecture"</h1>
    <p>Un design géométrique propre, lisible et parfaitement intégré aux couleurs de l'application.</p>
    
    <div class="icon-preview">
        <canvas id="canvas-icon" width="512" height="512"></canvas>
    </div>

    <button class="btn" onclick="generateIcon()">⬇️ Télécharger icon.png</button>
</div>

<script>
    function drawIcon() {
        const canvas = document.getElementById('canvas-icon');
        const ctx = canvas.getContext('2d');

        // 1. FOND (Parchemin de l'appli)
        ctx.fillStyle = "#F4EEDD";
        ctx.fillRect(0, 0, 512, 512);

        // RÉGLAGES DU TRAIT (Couleur Bois)
        ctx.strokeStyle = "#6D432C";
        ctx.lineWidth = 32;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        // 2. LE TOIT DE LA MAISON
        ctx.beginPath();
        ctx.moveTo(256, 100);  // Sommet
        ctx.lineTo(100, 230);  // Pente gauche
        ctx.moveTo(256, 100);
        ctx.lineTo(412, 230);  // Pente droite
        ctx.stroke();

        // 3. LE LIVRE OUVERT (Forme les murs et le sol)
        
        // Tranche du haut des pages
        ctx.beginPath();
        ctx.moveTo(140, 250);
        ctx.quadraticCurveTo(200, 270, 256, 250); // Courbe gauche
        ctx.quadraticCurveTo(312, 270, 372, 250); // Courbe droite
        ctx.stroke();

        // Contours extérieurs et bas des pages
        ctx.beginPath();
        ctx.moveTo(140, 250);
        ctx.lineTo(140, 380); // Bordure gauche
        ctx.quadraticCurveTo(200, 410, 256, 370); // Bas page gauche
        ctx.quadraticCurveTo(312, 410, 372, 380); // Bas page droite
        ctx.lineTo(372, 250); // Bordure droite
        ctx.stroke();

        // Reliure centrale
        ctx.beginPath();
        ctx.moveTo(256, 250);
        ctx.lineTo(256, 370);
        ctx.stroke();

        // 4. LE FOYER CHALEUREUX (L'étoile/soleil au centre)
        ctx.fillStyle = "#f39c12"; // Couleur "Étoile" de tes favoris
        ctx.beginPath();
        ctx.arc(256, 175, 24, 0, Math.PI * 2);
        ctx.fill();
    }

    function generateIcon() {
        const canvas = document.getElementById('canvas-icon');
        const dataUrl = canvas.toDataURL("image/png");

        const link = document.createElement('a');
        link.download = 'icon.png';
        link.href = dataUrl;
        link.click();
    }

    // Dessiner l'icône dès l'ouverture de la page
    window.onload = drawIcon;
</script>

</body>
</html>
